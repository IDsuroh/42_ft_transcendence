server  {
    # If someone visits http://localhost/... redirect them to https://localhost/...
    listen  80;

    server_name localhost;

    return  301 https://$host$request_uri;
}

server  {
    # Listen for HTTPS requests on port 443 and expects SSL/TLS traffic and not plain HTTP.
    listen  443 ssl;

    server_name localhost;

    # Tells Nginx where the certificate and the private key are located inside the container
    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Docker's internal DNS resolver.
    # This lets Nginx resolve Docker Compose service names like "backend" and "frontend".
    # valid means: cache the result for 10 seconds to keep the cache short
    # Do not ask for IPv6 addresses. Only use IPv4 lookups.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/  {
        # If the browser request starts with /api/, send it to backend container.
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;

        # Standard reverse-proxy headers.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /  {
        # Serve the built React frontend files directly from Nginx.
        root    /usr/share/nginx/html;
        index   index.html;

        # React Router fallback:
        # If the requested path is not a real file, return index.html
        # so React Router can handle routes like /signup, /login, /home, /privacy, and /terms.
        try_files   $uri $uri/ /index.html;
    }
}

# What is a React Router?
#   - Part of the React app that decides which React page/component should appear for this browser URL?
#
# Nginx starts
#     ↓
# Nginx reads config
#     ↓
# It knows it should use Docker DNS: 127.0.0.11
#     ↓
# It does not crash immediately because backend is inside a variable
#     ↓
# Browser later requests /api/users/me/
#     ↓
# Nginx now resolves backend using Docker DNS
#     ↓
# Docker says backend = 172.xx.xx.xx
#     ↓
# Nginx forwards request to backend:8000
